# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: envio-indexer
contracts:
- name: Morpho
  handler: src/EventHandlers.ts
  events:
  - event: AccrueInterest(bytes32 indexed id, uint256 prevBorrowRate, uint256 interest, uint256 feeShares)
    field_selection:
      transaction_fields:
        - hash
  - event: Borrow(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: CreateMarket(bytes32 indexed id, (address,address,address,address,uint256) marketParams)
    field_selection:
      transaction_fields:
        - hash
  - event: EnableIrm(address indexed irm)
    field_selection:
      transaction_fields:
        - hash
  - event: EnableLltv(uint256 lltv)
    field_selection:
      transaction_fields:
        - hash
  - event: FlashLoan(address indexed caller, address indexed token, uint256 assets)
    field_selection:
      transaction_fields:
        - hash
  - event: IncrementNonce(address indexed caller, address indexed authorizer, uint256 usedNonce)
    field_selection:
      transaction_fields:
        - hash
  - event: Liquidate(bytes32 indexed id, address indexed caller, address indexed borrower, uint256 repaidAssets, uint256 repaidShares, uint256 seizedAssets, uint256 badDebtAssets, uint256 badDebtShares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: Repay(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: SetAuthorization(address indexed caller, address indexed authorizer, address indexed authorized, bool newIsAuthorized)
    field_selection:
      transaction_fields:
        - hash
  - event: SetFee(bytes32 indexed id, uint256 newFee)
    field_selection:
      transaction_fields:
        - hash
  - event: SetFeeRecipient(address indexed newFeeRecipient)
    field_selection:
      transaction_fields:
        - hash
  - event: SetOwner(address indexed newOwner)
    field_selection:
      transaction_fields:
        - hash
  - event: Supply(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: SupplyCollateral(bytes32 indexed id, address indexed caller, address indexed onBehalf, uint256 assets)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: Withdraw(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: WithdrawCollateral(bytes32 indexed id, address caller, address indexed onBehalf, address indexed receiver, uint256 assets)
    field_selection:
      transaction_fields:
        - hash
        - input

- name: AdaptiveCurveIrm
  handler: src/EventHandlers.ts
  events:
  - event: BorrowRateUpdate(bytes32 indexed id, uint256 avgBorrowRate, uint256 rateAtTarget)
    field_selection:
      transaction_fields:
        - hash

- name: VaultV2Factory
  handler: src/EventHandlers.ts
  events:
  - event: CreateVaultV2(address indexed owner, address indexed asset, bytes32 salt, address indexed newVaultV2)
    field_selection:
      transaction_fields:
        - hash

- name: VaultV2
  handler: src/EventHandlers.ts
  events:
  - event: AddAdapter(address indexed account)
    field_selection:
      transaction_fields:
        - hash
  - event: Allocate(address indexed sender, address indexed adapter, uint256 assets, bytes32[] ids, int256 change)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: DecreaseAbsoluteCap(address indexed sender, bytes32 indexed id, bytes idData, uint256 newAbsoluteCap)
    field_selection:
      transaction_fields:
        - hash
  - event: DecreaseRelativeCap(address indexed sender, bytes32 indexed id, bytes idData, uint256 newRelativeCap)
    field_selection:
      transaction_fields:
        - hash
  - event: Deallocate(address indexed sender, address indexed adapter, uint256 assets, bytes32[] ids, int256 change)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: Deposit(address indexed sender, address indexed onBehalf, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: ForceDeallocate(address indexed sender, address adapter, uint256 assets, address indexed onBehalf, bytes32[] ids, uint256 penaltyAssets)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: IncreaseAbsoluteCap(bytes32 indexed id, bytes idData, uint256 newAbsoluteCap)
    field_selection:
      transaction_fields:
        - hash
  - event: IncreaseRelativeCap(bytes32 indexed id, bytes idData, uint256 newRelativeCap)
    field_selection:
      transaction_fields:
        - hash
  - event: RemoveAdapter(address indexed account)
    field_selection:
      transaction_fields:
        - hash
  - event: SetAdapterRegistry(address indexed newAdapterRegistry)
    field_selection:
      transaction_fields:
        - hash
  - event: SetCurator(address indexed newCurator)
    field_selection:
      transaction_fields:
        - hash
  - event: SetForceDeallocatePenalty(address indexed adapter, uint256 forceDeallocatePenalty)
    field_selection:
      transaction_fields:
        - hash
  - event: SetIsAllocator(address indexed account, bool newIsAllocator)
    field_selection:
      transaction_fields:
        - hash
  - event: SetIsSentinel(address indexed account, bool newIsSentinel)
    field_selection:
      transaction_fields:
        - hash
  - event: SetManagementFee(uint256 newManagementFee)
    field_selection:
      transaction_fields:
        - hash
  - event: SetManagementFeeRecipient(address indexed newManagementFeeRecipient)
    field_selection:
      transaction_fields:
        - hash
  - event: SetMaxRate(uint256 newMaxRate)
    field_selection:
      transaction_fields:
        - hash
  - event: SetName(string newName)
    field_selection:
      transaction_fields:
        - hash
  - event: SetOwner(address indexed newOwner)
    field_selection:
      transaction_fields:
        - hash
  - event: SetPerformanceFee(uint256 newPerformanceFee)
    field_selection:
      transaction_fields:
        - hash
  - event: SetPerformanceFeeRecipient(address indexed newPerformanceFeeRecipient)
    field_selection:
      transaction_fields:
        - hash
  - event: SetReceiveAssetsGate(address indexed newReceiveAssetsGate)
    field_selection:
      transaction_fields:
        - hash
  - event: SetReceiveSharesGate(address indexed newReceiveSharesGate)
    field_selection:
      transaction_fields:
        - hash
  - event: SetSendAssetsGate(address indexed newSendAssetsGate)
    field_selection:
      transaction_fields:
        - hash
  - event: SetSendSharesGate(address indexed newSendSharesGate)
    field_selection:
      transaction_fields:
        - hash
  - event: SetSymbol(string newSymbol)
    field_selection:
      transaction_fields:
        - hash
  - event: Withdraw(address indexed sender, address indexed receiver, address indexed onBehalf, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input

- name: MetaMorphoFactory
  handler: src/EventHandlers.ts
  events:
  - event: CreateMetaMorpho(address indexed metaMorpho, address indexed caller, address initialOwner, uint256 initialTimelock, address indexed asset, string name, string symbol, bytes32 salt)
    field_selection:
      transaction_fields:
        - hash

- name: MetaMorphoVault
  handler: src/EventHandlers.ts
  events:
  - event: Deposit(address indexed sender, address indexed owner, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: Withdraw(address indexed sender, address indexed receiver, address indexed owner, uint256 assets, uint256 shares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: ReallocateSupply(address indexed caller, bytes32 indexed id, uint256 suppliedAssets, uint256 suppliedShares)
    field_selection:
      transaction_fields:
        - hash
        - input
  - event: ReallocateWithdraw(address indexed caller, bytes32 indexed id, uint256 withdrawnAssets, uint256 withdrawnShares)
    field_selection:
      transaction_fields:
        - hash
        - input

- name: MorphoMarketV1AdapterFactory
  handler: src/EventHandlers.ts
  events:
  - event: CreateMorphoMarketV1Adapter(address indexed parentVault, address indexed morpho, address indexed morphoMarketV1Adapter)
    field_selection:
      transaction_fields:
        - hash

- name: MorphoMarketV1AdapterV2Factory
  handler: src/EventHandlers.ts
  events:
  - event: CreateMorphoMarketV1AdapterV2Factory(address indexed morpho, address indexed adaptiveCurveIrm)
    field_selection:
      transaction_fields:
        - hash
  - event: CreateMorphoMarketV1AdapterV2(address indexed parentVault, address indexed morphoMarketV1AdapterV2)
    field_selection:
      transaction_fields:
        - hash

