# ============================================
# State Entities - Track protocol state
# ============================================

type Market {
  id: ID!                      # "{chainId}_{marketId}"
  chainId: Int!
  marketId: String!            # bytes32 market id

  # MarketParams (immutable after creation)
  loanToken: String!
  collateralToken: String!
  oracle: String!
  irm: String!
  lltv: BigInt!

  # Market state (mutable)
  totalSupplyAssets: BigInt!
  totalSupplyShares: BigInt!
  totalBorrowAssets: BigInt!
  totalBorrowShares: BigInt!
  lastUpdate: BigInt!
  fee: BigInt!

  # AdaptiveCurveIrm state
  rateAtTarget: BigInt!
}

type Position {
  id: ID!                      # "{chainId}_{marketId}_{user}"
  chainId: Int!
  marketId: String!
  user: String!

  # Position state
  supplyShares: BigInt!
  borrowShares: BigInt!
  collateral: BigInt!

  # Relationship
  market_id: String!           # FK to Market
}

type Authorization {
  id: ID!                      # "{chainId}_{authorizer}_{authorizee}"
  chainId: Int!
  authorizer: String!
  authorizee: String!
  isAuthorized: Boolean!
}
