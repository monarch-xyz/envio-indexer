# ============================================
# State Entities - Track protocol state
# ============================================

type Market {
  id: ID!                      # "{chainId}_{marketId}"
  chainId: Int!
  marketId: String!            # bytes32 market id

  # MarketParams (immutable after creation)
  loanToken: String!
  collateralToken: String!
  oracle: String!
  irm: String!
  lltv: BigInt!

  # Market state (mutable)
  totalSupplyAssets: BigInt!
  totalSupplyShares: BigInt!
  totalBorrowAssets: BigInt!
  totalBorrowShares: BigInt!
  accruedBadDebtAssets: BigInt! # cumulative bad debt realized for this market
  accruedBadDebtShares: BigInt! # cumulative bad debt shares realized for this market
  collateralAssets: BigInt!
  lastUpdate: BigInt!
  fee: BigInt!

  # AdaptiveCurveIrm state
  rateAtTarget: BigInt!
}

type Position {
  id: ID!                      # "{chainId}_{marketId}_{user}"
  chainId: Int!
  marketId: String!
  user: String!

  # Position state
  supplyShares: BigInt!
  borrowShares: BigInt!
  collateral: BigInt!

  # Relationship
  market_id: String!           # FK to Market
}

type Authorization {
  id: ID!                      # "{chainId}_{authorizer}_{authorizee}"
  chainId: Int!
  authorizer: String!
  authorizee: String!
  isAuthorized: Boolean!
}

# ============================================
# VaultV2 State + Events
# ============================================

type Vault {
  id: ID!                      # "{chainId}_{vaultAddress}"
  chainId: Int!
  vaultAddress: String! @index
  asset: String!
  owner: String! @index
  curator: String @index
  name: String
  symbol: String
  adapterRegistry: String @index
  receiveAssetsGate: String
  receiveSharesGate: String
  sendAssetsGate: String
  sendSharesGate: String
  managementFee: BigInt!
  performanceFee: BigInt!
  managementFeeRecipient: String
  performanceFeeRecipient: String
  maxRate: BigInt!
  lastUpdate: BigInt!

  # Cumulative movement counters derived from Deposit/Withdraw events only.
  totalDepositedAssets: BigInt!
  totalDepositedShares: BigInt!
  totalWithdrawnAssets: BigInt!
  totalWithdrawnShares: BigInt!

  allocators: [VaultAllocator!]! @derivedFrom(field: "vault")
  sentinels: [VaultSentinel!]! @derivedFrom(field: "vault")
  adapters: [VaultAdapter!]! @derivedFrom(field: "vault")
  knownAdapters: [Adapter!]! @derivedFrom(field: "vault")
  caps: [VaultCap!]! @derivedFrom(field: "vault")
}

type VaultAllocator @index(fields: ["account", "isAllocator"]) {
  id: ID!                      # "{chainId}_{vaultAddress}_{account}"
  vault: Vault!
  chainId: Int!
  vaultAddress: String! @index
  account: String! @index
  isAllocator: Boolean!
}

type VaultSentinel @index(fields: ["account", "isSentinel"]) {
  id: ID!                      # "{chainId}_{vaultAddress}_{account}"
  vault: Vault!
  chainId: Int!
  vaultAddress: String! @index
  account: String! @index
  isSentinel: Boolean!
}

type VaultAdapter
  @index(fields: ["adapterAddress", "isActive"])
  @index(fields: ["vaultAddress", "isActive"]) {
  id: ID!                      # "{chainId}_{vaultAddress}_{adapterAddress}"
  vault: Vault!
  chainId: Int!
  vaultAddress: String! @index
  adapterAddress: String! @index
  isActive: Boolean!
  forceDeallocatePenalty: BigInt!
}

type VaultCap @index(fields: ["paramId", "vaultAddress"]) {
  id: ID!                      # "{chainId}_{vaultAddress}_{paramId}"
  vault: Vault!
  chainId: Int!
  vaultAddress: String! @index
  paramId: String! @index
  paramIdData: String!
  absoluteCap: BigInt!
  relativeCap: BigInt!
  lastUpdate: BigInt!
}

type Adapter @index(fields: ["vaultAddress", "adapterType"]) {
  id: ID!                      # "{chainId}_{adapterAddress}"
  vault: Vault!
  chainId: Int!
  vaultAddress: String! @index
  adapterAddress: String! @index
  adapterType: String! @index
  factoryAddress: String! @index
  morphoAddress: String @index
  createdAt: BigInt!
  txHash: String!
}

type TxContext {
  id: ID!                      # "{chainId}_{txHash}"
  chainId: Int!
  txHash: String!
  timestamp: BigInt!
  hasMorphoBlueEvent: Boolean!
  hasVaultV2Event: Boolean!
  hasVaultUserDeposit: Boolean!
  hasVaultUserWithdraw: Boolean!
  hasVaultRebalance: Boolean!
  hasVaultConfigChange: Boolean!
  vaultTxType: String!

  morphoBorrows: [Morpho_Borrow!]! @derivedFrom(field: "txContext")
  morphoLiquidations: [Morpho_Liquidate!]! @derivedFrom(field: "txContext")
  morphoRepays: [Morpho_Repay!]! @derivedFrom(field: "txContext")
  morphoSupplies: [Morpho_Supply!]! @derivedFrom(field: "txContext")
  morphoSupplyCollaterals: [Morpho_SupplyCollateral!]! @derivedFrom(field: "txContext")
  morphoWithdraws: [Morpho_Withdraw!]! @derivedFrom(field: "txContext")
  morphoWithdrawCollaterals: [Morpho_WithdrawCollateral!]! @derivedFrom(field: "txContext")
  vaultCreations: [VaultV2Factory_CreateVaultV2!]! @derivedFrom(field: "txContext")
  vaultDeposits: [VaultV2_Deposit!]! @derivedFrom(field: "txContext")
  vaultAllocations: [VaultV2_Allocate!]! @derivedFrom(field: "txContext")
  vaultDeallocations: [VaultV2_Deallocate!]! @derivedFrom(field: "txContext")
  vaultForceDeallocations: [VaultV2_ForceDeallocate!]! @derivedFrom(field: "txContext")
  vaultWithdrawals: [VaultV2_Withdraw!]! @derivedFrom(field: "txContext")
}

